name: Build LOS23 Kernel with SukiSU-Ultra + SUSFS (Non-GKI)

on:
  workflow_dispatch:

env:
  KERNEL_SOURCE: https://github.com/LineageOS/android_kernel_oneplus_sm8250.git
  KERNEL_BRANCH: lineage-23.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison build-essential flex \
            libssl-dev libelf-dev python3 cpio zip android-sdk-libsparse-utils lz4

      - name: Setup mkbootimg tools
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/system/tools/mkbootimg
          chmod +x mkbootimg/*.py
          echo "$GITHUB_WORKSPACE/mkbootimg" >> $GITHUB_PATH

      - name: Setup Clang
        run: |
          mkdir -p toolchains/clang
          curl -sL "https://github.com/ZyCromerZ/Clang/releases/download/14.0.6-20250704-release/Clang-14.0.6-20250704.tar.gz" | \
            tar -xzf - -C toolchains/clang
          echo "$GITHUB_WORKSPACE/toolchains/clang/bin" >> $GITHUB_PATH

      - name: Setup GCC
        run: |
          git clone --depth=1 -b android12L-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            toolchains/gcc64
          git clone --depth=1 -b android12L-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            toolchains/gcc32
          echo "$GITHUB_WORKSPACE/toolchains/gcc64/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchains/gcc32/bin" >> $GITHUB_PATH

      - name: Clone Kernel
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_SOURCE kernel

      - name: Fix LineageOS 23 Bugs
        run: |
          cd kernel

          sed -i 's/if (pon->log_kpd_event && (cfg->pon_type == PON_KPDPWR))/if (0)/' drivers/input/misc/qpnp-power-on.c
          sed -i 's/if (pon->log_kpd_event) {/if (0) {/' drivers/input/misc/qpnp-power-on.c
          sed -i '/pon->log_kpd_event = of_property_read_bool/,/"qcom,log-kpd-event");/d' drivers/input/misc/qpnp-power-on.c

          sed -i 's/^int get_cached_platform_id(void);/static inline int get_cached_platform_id(void) { return 0; }/' include/soc/oplus/oplus_wakelock_profiler.h || true

          sed -i '1i struct smb_charger;' drivers/power/supply/qcom/schgm-flash.h || true
          sed -i '/#include "schgm-flash.h"/a #include "smb5-lib.h"' drivers/power/supply/qcom/schgm-flash.c || true

          sed -i 's/global_zone_page_state(NR_IONCACHE_PAGES)/0/g' drivers/staging/android/ion/ion_system_heap.c || true

          cat > drivers/soc/oplus/oplus_stubs.c << 'EOFSTUB'
          #include <linux/module.h>
          void hans_report(int a, int b, int c, char* d) {}
          EXPORT_SYMBOL(hans_report);
          int get_boot_mode(void) { return 0; }
          EXPORT_SYMBOL(get_boot_mode);
          int get_eng_version(void) { return 0; }
          EXPORT_SYMBOL(get_eng_version);
          int oplus_daily_build(void) { return 0; }
          EXPORT_SYMBOL(oplus_daily_build);
          int kswapd_threads = 1;
          EXPORT_SYMBOL(kswapd_threads);
          int oplus_vooc_adapter_update_is_rx_gpio(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_rx_gpio);
          int oplus_vooc_adapter_update_is_tx_gpio(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_adapter_update_is_tx_gpio);
          int get_project(void) { return 0; }
          EXPORT_SYMBOL(get_project);
          int is_confidential(void) { return 0; }
          EXPORT_SYMBOL(is_confidential);
          void oplus_wpc_set_wrx_en_value(int a) {}
          EXPORT_SYMBOL(oplus_wpc_set_wrx_en_value);
          void opchg_set_pd_sdp(int a) {}
          EXPORT_SYMBOL(opchg_set_pd_sdp);
          void black_screen_timer_restart(void) {}
          EXPORT_SYMBOL(black_screen_timer_restart);
          void bright_screen_timer_restart(void) {}
          EXPORT_SYMBOL(bright_screen_timer_restart);
          int oplus_vooc_get_fastchg_started(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_started);
          int oplus_vooc_get_fastchg_ing(void) { return 0; }
          EXPORT_SYMBOL(oplus_vooc_get_fastchg_ing);
          int oplus_gauge_init(void *a) { return 0; }
          EXPORT_SYMBOL(oplus_gauge_init);
          int get_PCB_Version(void) { return 0; }
          EXPORT_SYMBOL(get_PCB_Version);
          void switch_headset_state(int a) {}
          EXPORT_SYMBOL(switch_headset_state);
          int opticalfp_irq_handler_register(void *a) { return 0; }
          EXPORT_SYMBOL(opticalfp_irq_handler_register);
          int is_project(int a) { return 0; }
          EXPORT_SYMBOL(is_project);
          int smblib_write(void *chg, int reg, int val) { return 0; }
          EXPORT_SYMBOL(smblib_write);
          int smblib_read(void *chg, int reg, int *val) { return 0; }
          EXPORT_SYMBOL(smblib_read);
          int smblib_masked_write(void *chg, int reg, int mask, int val) { return 0; }
          EXPORT_SYMBOL(smblib_masked_write);
          int qpnp_is_power_off_charging(void) { return 0; }
          EXPORT_SYMBOL(qpnp_is_power_off_charging);
          EOFSTUB
          echo 'obj-y += oplus_stubs.o' >> drivers/soc/oplus/Makefile

      - name: Setup SukiSU-Ultra with builtin SUSFS
        run: |
          cd kernel
          echo "Setting up SukiSU-Ultra (official builtin mode with SUSFS integration)..."

          # Use official SukiSU-Ultra builtin setup - handles SUSFS integration automatically
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

          if [ ! -d "KernelSU" ]; then
            echo "ERROR: SukiSU-Ultra setup failed!"
            exit 1
          fi

          ls -la drivers/kernelsu/
          echo "SukiSU-Ultra setup completed (builtin mode with SUSFS)"

      - name: Install SUSFS headers and source
        run: |
          cd kernel
          echo "Installing SUSFS headers and source from official susfs4ksu repo..."

          git clone --depth=1 -b kernel-4.19 \
            https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu

          cp ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true

          if [ -f ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch ]; then
            echo "Applying SUSFS 4.19 kernel patch..."
            patch -p1 --forward --fuzz=3 < ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true
          fi

          if ! grep -q "susfs.o" fs/Makefile; then
            echo "obj-\$(CONFIG_KSU_SUSFS) += susfs.o" >> fs/Makefile
          fi

          echo "SUSFS files installed:"
          ls -la include/linux/susfs*.h fs/susfs.c 2>/dev/null || true
          grep -n "susfs" fs/Makefile || true

      - name: Disable KPM for 4.19 compatibility
        run: |
          cd kernel
          echo "Disabling KPM for 4.19 compatibility (reference repo does not use KPM)..."
          sed -i '/CONFIG_KPM/d' drivers/kernelsu/kpm/Kconfig 2>/dev/null || true
          echo "# KPM disabled for 4.19 Non-GKI compatibility" >> drivers/kernelsu/kpm/Kconfig

      - name: Use Device Config
        run: |
          cd kernel
          mkdir -p out
          cp $GITHUB_WORKSPACE/device_config out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Enable KSU and SUSFS in Config
        run: |
          cd kernel
          scripts/config --file out/.config -e KSU
          scripts/config --file out/.config -e KALLSYMS
          scripts/config --file out/.config -e KALLSYMS_ALL
          # Required for SUSFS TIF_PROC_UMOUNTED flag
          scripts/config --file out/.config -e THREAD_INFO_IN_TASK
          # Enable SUSFS features (matching reference repo config)
          scripts/config --file out/.config -e KSU_SUSFS
          scripts/config --file out/.config -e KSU_SUSFS_HAS_MAGIC_MOUNT
          scripts/config --file out/.config -e KSU_MANUAL_HOOK
          scripts/config --file out/.config -e KSU_SUSFS_SUS_PATH
          scripts/config --file out/.config -e KSU_SUSFS_SUS_MOUNT
          scripts/config --file out/.config -e KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          scripts/config --file out/.config -e KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT
          scripts/config --file out/.config -e KSU_SUSFS_SUS_KSTAT
          scripts/config --file out/.config -e KSU_SUSFS_TRY_UMOUNT
          scripts/config --file out/.config -e KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
          scripts/config --file out/.config -e KSU_SUSFS_SPOOF_UNAME
          scripts/config --file out/.config -e KSU_SUSFS_ENABLE_LOG
          scripts/config --file out/.config -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          scripts/config --file out/.config -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          scripts/config --file out/.config -e KSU_SUSFS_OPEN_REDIRECT
          make O=out ARCH=arm64 olddefconfig
          echo "Checking KSU and SUSFS config:"
          grep -E "CONFIG_KSU|CONFIG_THREAD_INFO|CONFIG_KSU_SUSFS|CONFIG_KSU_MANUAL_HOOK" out/.config | head -40

      - name: Build Kernel
        run: |
          cd kernel
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM_IAS=1 LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

      - name: Apply KPM Patch to Kernel Image
        run: |
          cd kernel/out/arch/arm64/boot/
          if [ ! -f "Image" ]; then
            echo "Build failed - no Image file!"
            exit 1
          fi
          echo "Applying KernelPatch Module (KPM) patch..."
          wget -q https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.2/patch_linux
          chmod +x patch_linux
          ./patch_linux
          if [ -f "oImage" ]; then
            rm Image
            mv oImage Image
            echo "KPM patch applied successfully"
            ls -lh Image
          else
            echo "KPM patching failed, using original Image"
          fi
          rm -f patch_linux

      - name: Package
        run: |
          cd kernel
          if [ ! -f "out/arch/arm64/boot/Image" ]; then
            echo "Build failed!"
            exit 1
          fi
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git modules patch ramdisk
          cp ../out/arch/arm64/boot/Image .
          sed -i 's/do.devicecheck=.*/do.devicecheck=1/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=kebab/g' anykernel.sh
          sed -i 's|block=.*|block=/dev/block/bootdevice/by-name/boot;|g' anykernel.sh
          sed -i 's/is_slot_device=.*/is_slot_device=1;/g' anykernel.sh
          ZIP_NAME="SukiSU-Ultra-SUSFS_OnePlus8T_$(date +%Y%m%d).zip"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" * -x .git README.md *placeholder
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create boot.img
        run: |
          cd kernel
          BOOT_IMG="SukiSU-Ultra-SUSFS_boot_OnePlus8T_$(date +%Y%m%d).img"
          lz4 -l -12 --favor-decSpeed "$GITHUB_WORKSPACE/lineage-os/ramdisk.cpio" ramdisk.cpio.lz4
          python3 $GITHUB_WORKSPACE/mkbootimg/mkbootimg.py \
            --kernel out/arch/arm64/boot/Image \
            --ramdisk ramdisk.cpio.lz4 \
            --dtb "$GITHUB_WORKSPACE/lineage-os/dtb" \
            --pagesize 4096 \
            --base 0x00000000 \
            --kernel_offset 0x00008000 \
            --ramdisk_offset 0x01000000 \
            --tags_offset 0x00000100 \
            --dtb_offset 0x01f00000 \
            --header_version 2 \
            --os_version 16.0.0 \
            --os_patch_level 2025-12 \
            --cmdline "androidboot.hardware=qcom androidboot.memcg=1 androidboot.usbcontroller=a600000.dwc3 cgroup.memory=nokmem,nosocket loop.max_part=7 lpm_levels.sleep_disabled=1 msm_rtb.filter=0x237 reboot=panic_warm service_locator.enable=1 swiotlb=2048" \
            --output "$GITHUB_WORKSPACE/$BOOT_IMG"
          echo "BOOT_IMG=$BOOT_IMG" >> $GITHUB_ENV
          ls -lh "$GITHUB_WORKSPACE/$BOOT_IMG"

      - name: Upload AnyKernel3 ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BOOT_IMG }}
          path: ${{ env.BOOT_IMG }}

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: sukisu-susfs-${{ github.run_number }}
          name: SukiSU-Ultra + SUSFS Build ${{ github.run_number }}
          body: |
            ## SukiSU-Ultra + SUSFS (Builtin) + KPM for OnePlus 8T (LineageOS 23)

            This build uses:
            - [SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra) **official main branch** (builtin SUSFS integration)
            - SUSFS integrated via SukiSU-Ultra builtin setup
            - **KPM (KernelPatch Module)** support patched in
            - Automatic hook handling (no manual kprobes disabling)

            ### SUSFS Features
            - SUS_PATH, SUS_MOUNT, SUS_KSTAT
            - SPOOF_UNAME, SPOOF_CMDLINE_OR_BOOTCONFIG
            - OPEN_REDIRECT, SUS_MAP
            - HIDE_KSU_SUSFS_SYMBOLS
            - ENABLE_LOG

            ### KPM (KernelPatch Module)
            Kernel is patched with KPM support for loading additional kernel patches

            ### Installation
            - Flash via TWRP or fastboot boot.img

            ### Manager
            Use SukiSU Manager from: https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.BOOT_IMG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
